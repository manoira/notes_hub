name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-websupport
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: npm ci && npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.WEBSUPPORT_SFTP_SERVER }}
          username: ${{ secrets.WEBSUPPORT_SFTP_USERNAME }}
          password: ${{ secrets.WEBSUPPORT_SFTP_PASSWORD }}
          port: 22
          sftp_only: true
          local_path: './dist/*'
          remote_path: '/public_html/'
          delete_remote_files: false
