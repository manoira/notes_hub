name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-websupport
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: npm ci && npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.WEBSUPPORT_SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.WEBSUPPORT_SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.WEBSUPPORT_SFTP_PASSWORD }}
        run: |
          set -euo pipefail
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" "sftp://$SFTP_SERVER:22" <<'EOF'
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          set net:timeout 30
          set net:max-retries 2
          set cmd:fail-exit yes
          lcd dist
          put index.html
          put .htaccess
          put icons.svg
          put favicon.svg
          mkdir -f assets
          cd assets
          lcd assets
          mput *
          bye
          EOF
