name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-websupport
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: npm ci && npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.WEBSUPPORT_SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.WEBSUPPORT_SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.WEBSUPPORT_SFTP_PASSWORD }}
        run: |
          set -euo pipefail
          {
            echo 'set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"'
            echo 'set cmd:fail-exit yes'
            echo 'cd public_html'
            echo 'rm -f index.php'
            find dist -type f | while IFS= read -r file; do
              relpath="${file#dist/}"
              reldir="$(dirname "$relpath")"
              filename="$(basename "$relpath")"
              if [ "$reldir" = "." ]; then
                echo 'lcd dist'
                echo "put -O . $filename"
              else
                echo "mkdir -p -f $reldir"
                echo "cd $reldir"
                echo "lcd dist/$reldir"
                echo "put -O . $filename"
                echo 'cd ..'
                echo 'lcd ..'
              fi
            done
            echo 'bye'
          } | lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" "sftp://$SFTP_SERVER:22"
