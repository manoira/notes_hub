name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-websupport
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: npm ci && npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass openssh-client

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.WEBSUPPORT_SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.WEBSUPPORT_SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.WEBSUPPORT_SFTP_PASSWORD }}
        run: |
          set -euo pipefail
          batch="$(mktemp)"
          {
            echo "cd public_html"
            find dist -type f | while IFS= read -r file; do
              echo "put $file ${file#dist/}"
            done
            echo "bye"
          } > "$batch"
          sshpass -p "$SFTP_PASSWORD" sftp \
            -o StrictHostKeyChecking=no \
            -P 22 \
            -b "$batch" \
            "$SFTP_USERNAME@$SFTP_SERVER"
