name: Deploy to Websupport

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-websupport
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: npm ci && npm run build

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.WEBSUPPORT_SFTP_SERVER }}
          username: ${{ secrets.WEBSUPPORT_SFTP_USERNAME }}
          password: ${{ secrets.WEBSUPPORT_SFTP_PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: true
