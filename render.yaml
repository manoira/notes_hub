# Notes Hub — Render Blueprint
#
# Frontend-only Vite app (static site on Render CDN).
# Media Hub uses a web service because it runs an API + database; Notes Hub
# only needs a static build until you add a backend (e.g. Neon).

services:
  - type: web
    name: notes-hub
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
