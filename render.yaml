# Notes Hub — Render Blueprint
#
# Prefer Vercel for free API + Redis: see docs/VERCEL.md
# This file remains for the static site on Render if you keep using it.

services:
  - type: web
    name: notes-hub
    runtime: static
    branch: main
    buildCommand: npm ci && VITE_APP_VERSION=$RENDER_GIT_COMMIT npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: BASE_PATH
        value: /
      # Enable cross-device sync once notes-hub-api is live:
      # - key: VITE_STORAGE_MODE
      #   value: remote
      # - key: VITE_API_BASE_URL
      #   value: https://notes-hub-api.onrender.com
      # - key: VITE_WORKSPACE_TOKEN
      #   sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache

  - type: web
    name: notes-hub-api
    runtime: node
    branch: main
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: WORKSPACE_DATA_FILE
        value: /var/data/workspace.json
      - key: WORKSPACE_TOKEN
        sync: false
      - key: CORS_ORIGIN
        value: https://emmyzettergren.se
    disk:
      name: notes-hub-api-data
      mountPath: /var/data
      sizeGB: 1
