# Notes Hub — Render Blueprint
#
# Static site on Render CDN. Auto-deploys from GitHub main.
# Media Hub uses a web service (API + DB); add a second service here when Neon arrives.

services:
  - type: web
    name: notes-hub
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
